# Built from:
# https://docs.github.com/en/actions/guides/building-and-testing-python

name: Build and test

on:
  push:
    branches: [ main ]

  pull_request:
      types:
          - opened
          - reopened
          - synchronize
          - ready_for_review

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  test:
    needs: [quality-checks]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]

    steps:
      - uses: actions/checkout@v4

      - uses: ts-graphviz/setup-graphviz@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Regenerate datamodel and check for drift
        if: github.event_name == 'pull_request'
        run: |
          rm -f src/linkml_map/datamodel/transformer_model.py
          make src/linkml_map/datamodel/transformer_model.py
          if ! git diff --quiet src/linkml_map/datamodel/; then
            echo "::error::Generated files in src/linkml_map/datamodel/ are out of date."
            echo "Run 'make src/linkml_map/datamodel/transformer_model.py' and commit the result."
            git diff --stat src/linkml_map/datamodel/
            exit 1
          fi

      - name: Run tests
        run: make test
